<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Missing Children Search{% endblock %}</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />
    <link rel="stylesheet" href="{% static 'css/custom.css' %}" />
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="navbar sticky-top">
        <div class="container">
            <a class="brand" href="{% url 'home' %}">ImageSearch</a>
            <nav>
                <a href="{% url 'submit_child' %}">Submit Child</a>
                <a href="{% url 'search_child' %}">Search Child</a>
            </nav>
        </div>
    </header>
    {% if messages %}
    <div class="container mt-3">
        <div class="messages">
            {% for message in messages %}
                <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    </div>
    {% endif %}

    <main class="container flex-grow-1" role="main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <span class="text-muted">© 2023 Missing Children Search</span>
        </div>
    </footer>
</body>
</html>
